<script>
  (function(){
    const CURRENT_APP_VERSION = '3.7.0';
    
    // Check if storage is available
    const storageAvailable = (function() {
      try {
        var x = '__storage_test__';
        localStorage.setItem(x, x);
        localStorage.removeItem(x);
        return true;
      } catch (e) { return false; }
    })();

    // Just update the version record. NO REDIRECTS here.
    if (storageAvailable) {
      localStorage.setItem('sq_app_version', CURRENT_APP_VERSION);
    }

    // Auto-reload on network chunk failures (Hardened requirement)
    window.addEventListener('error', (e) => {
      if (e.message && (e.message.includes('module script') || e.message.includes('chunk'))) {
          window.location.reload(true);
      }
    }, true);
  })();
</script>

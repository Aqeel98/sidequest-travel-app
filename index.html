<script>
  (function() {
    const V = '3.7.0';
    const PURGE_KEY = 'sq_v370_stable_purge'; 

    if (localStorage.getItem(PURGE_KEY) === 'true') {
      return; 
    }

    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.getRegistrations().then(function(regs) {
        for (let r of regs) { r.unregister(); }
      });
    }
    if ('caches' in window) {
      caches.keys().then(function(keys) {
        for (let k of keys) { caches.delete(k); }
      });
    }

    localStorage.setItem(PURGE_KEY, 'true');
    localStorage.setItem('sq_app_version', V);

    window.location.replace(window.location.origin + window.location.pathname + '?v=' + V);
  })();
</script>
